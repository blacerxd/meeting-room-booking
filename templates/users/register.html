{% extends 'base.html' %}

{% block title %}Регистрация — MeetFlow{% endblock %}

{% block content %}
<section class="page-section">
  <div class="container">
    <div class="card-panel" style="max-width:560px;margin:0 auto;">
      <h3>Создать аккаунт</h3>

        {% csrf_token %}
        {{ form.as_p }}
        <button class="hero-cta" type="submit">Зарегистрироваться</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
