{% extends 'base.html' %}

{% block title %}Сброс пароля — MeetFlow{% endblock %}

{% block content %}
<section class="page-section">
  <div class="container">
    <div class="card-panel" style="max-width:520px;margin:0 auto;">
      <h3>Сброс пароля</h3>
      <form method="post">
        {% csrf_token %}
        {{ form.email.label_tag }}
        {{ form.email }}
        <button class="hero-cta" type="submit">Отправить ссылку</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
