{% extends 'base.html' %}

{% block title %}Новый пароль — MeetFlow{% endblock %}

{% block content %}
<section class="page-section">
  <div class="container">
    <div class="card-panel card-narrow">
      <h3>Установите новый пароль</h3>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="hero-cta" type="submit">Сохранить</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
